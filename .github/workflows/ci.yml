name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform dry run without publishing'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      target_series:
        description: 'Ubuntu series to publish to (e.g., noble, jammy)'
        required: false
        default: 'noble'
        type: string

jobs:
  test:
    name: ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: Fedora (latest)
            image: fedora:latest
          - distro: Ubuntu (latest LTS)
            image: ubuntu:24.04
          - distro: Debian (stable)
            image: debian:bookworm
          - distro: Arch Linux (latest)
            image: archlinux:latest
          - distro: openSUSE (Tumbleweed)
            image: opensuse/tumbleweed:latest

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packages (Fedora)
        if: startsWith(matrix.image, 'fedora')
        run: |
          dnf install -y \
            python3 python3-pip \
            python3-gobject gobject-introspection \
            gtk4 nautilus-python \
            pytest

      - name: Install packages (Ubuntu/Debian)
        if: startsWith(matrix.image, 'ubuntu') || startsWith(matrix.image, 'debian')
        run: |
          apt-get update
          apt-get install -y \
            python3 python3-pip \
            python3-gi gir1.2-gtk-4.0 \
            python3-nautilus gir1.2-nautilus-4.0 \
            python3-pytest

      - name: Install packages (Arch Linux)
        if: startsWith(matrix.image, 'archlinux')
        run: |
          pacman -Sy --noconfirm \
            python python-gobject gobject-introspection \
            gtk4 nautilus python-nautilus \
            python-pytest

      - name: Install packages (openSUSE)
        if: startsWith(matrix.image, 'opensuse')
        run: |
          zypper --non-interactive install \
            python313 python313-pip \
            python313-gobject gobject-introspection \
            gtk4 python313-nautilus \
            python313-pytest

      - name: Shell syntax check
        run: bash -n install.sh

      - name: Check Nautilus typelib availability
        id: typelib
        run: |
          if python3 -c "import gi; gi.require_version('Nautilus', '4.0')" 2>/dev/null; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Nautilus typelib not available in this container; skipping py_compile for paste_links.py"
          fi

      - name: Python syntax check (paste_links.py)
        if: steps.typelib.outputs.available == 'true'
        run: python3 -m py_compile src/paste_links.py

      - name: Run unit tests
        run: python3 -m pytest tests/ -v

  prepare-release:
    name: Prepare release
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.release.outputs.should_release }}
      is_release_branch: ${{ steps.release.outputs.is_release_branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read version file
        id: version
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION file: $VERSION"

      - name: Decide whether to build release artifacts
        id: release
        run: |
          SHOULD_RELEASE=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_RELEASE=true
          elif git diff --name-only HEAD~1 HEAD | grep -q '^VERSION$'; then
            SHOULD_RELEASE=true
          fi

          IS_RELEASE_BRANCH=false
          if [ "${GITHUB_REF}" = "refs/heads/main" ] || [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            IS_RELEASE_BRANCH=true
          fi

          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "is_release_branch=$IS_RELEASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE"
          echo "is_release_branch=$IS_RELEASE_BRANCH"

  source-tarball:
    name: Build source tarball
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source tarball
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          git archive --format=tar.gz --prefix="paste-links-${VERSION}/" \
              HEAD -o "paste-links-${VERSION}.tar.gz"

      - name: Upload source tarball
        uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: paste-links-*.tar.gz

  build-rpm-fedora:
    name: Build RPM (Fedora)
    needs: [prepare-release, source-tarball]
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y rpm-build rpmdevtools python3-devel

      - name: Set up RPM build tree
        run: rpmdev-setuptree

      - name: Download source tarball
        uses: actions/download-artifact@v4
        with:
          name: source-tarball
          path: ~/rpmbuild/SOURCES/

      - name: Build RPM
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          sed -i "s/^Version:.*/Version:        ${VERSION}/" packaging/paste-links.spec
          rpmbuild -ba packaging/paste-links.spec

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: rpm-fedora
          path: ~/rpmbuild/RPMS/noarch/paste-links-*.rpm

  build-rpm-opensuse:
    name: Build RPM (openSUSE)
    needs: [prepare-release, source-tarball]
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container:
      image: opensuse/tumbleweed:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          zypper --non-interactive install rpm-build rpmdevtools python3-devel

      - name: Set up RPM build tree
        run: rpmdev-setuptree

      - name: Download source tarball
        uses: actions/download-artifact@v4
        with:
          name: source-tarball
          path: ~/rpmbuild/SOURCES/

      - name: Build RPM
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          sed -i "s/^Version:.*/Version:        ${VERSION}/" packaging/opensuse/paste-links.spec
          rpmbuild -ba packaging/opensuse/paste-links.spec

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: rpm-opensuse
          path: ~/rpmbuild/RPMS/noarch/paste-links-*.rpm

  build-deb:
    name: Build DEB (Ubuntu/Debian)
    needs: [prepare-release, source-tarball]
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y devscripts debhelper fakeroot

      - name: Build binary package
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          cp -r packaging/debian debian
          sed -i "1s/^paste-links (.*/paste-links (${VERSION}-1) noble; urgency=low/" debian/changelog
          dpkg-buildpackage -us -uc -b
          mkdir -p output
          cp ../*.deb output/

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: deb-ubuntu
          path: output/*.deb

  build-arch:
    name: Build package (Arch Linux)
    needs: [prepare-release, source-tarball]
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Sy --noconfirm base-devel nautilus python-gobject gtk4 python-nautilus
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Download source tarball
        uses: actions/download-artifact@v4
        with:
          name: source-tarball
          path: /tmp/source-tarball

      - name: Build package
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          mkdir -p /home/builder/build
          cp /tmp/source-tarball/paste-links-*.tar.gz /home/builder/build/
          cp packaging/arch/PKGBUILD /home/builder/build/
          chown -R builder:builder /home/builder/build
          cd /home/builder/build
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          su - builder -c "cd /home/builder/build && makepkg --noconfirm --skipchecksums --skippgpcheck"

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: pkg-arch
          path: /home/builder/build/paste-links-*.pkg.tar.zst

  # Source package is separate from build-deb because it produces .changes/.dsc files
  # for PPA publishing, not a binary .deb for GitHub Releases.
  build-source-package:
    name: Build source package (Ubuntu)
    needs: [prepare-release, source-tarball]
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y build-essential devscripts debhelper fakeroot

      - name: Build source package
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          SERIES="${{ github.event_name == 'workflow_dispatch' && inputs.target_series || 'noble' }}"
          cp -r packaging/debian debian
          sed -i "1s/^paste-links (.*/paste-links (${VERSION}-1) ${SERIES}; urgency=low/" debian/changelog
          dpkg-buildpackage -us -uc -S
          mv ../*.changes ../*.dsc ../*.debian.tar.* ../*.orig.tar.* ../*.tar.* ../*.buildinfo . 2>/dev/null || true

      - name: Upload source package
        uses: actions/upload-artifact@v4
        with:
          name: source-package
          path: |
            *.changes
            *.dsc
            *.debian.tar.*
            *.orig.tar.*
            *.tar.*
            *.buildinfo

  sign-artifacts:
    name: Sign release artifacts
    needs: [prepare-release, source-tarball, build-rpm-fedora, build-rpm-opensuse, build-deb, build-arch, build-source-package]
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Install signing tools
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts

      - name: Sign source tarball
        run: |
          find artifacts/source-tarball -name "*.tar.gz" -exec gpg --batch --yes --detach-sign {} \;

      - name: Sign Fedora RPM
        run: |
          find artifacts/rpm-fedora -name "*.rpm" -exec gpg --batch --yes --detach-sign {} \;

      - name: Sign openSUSE RPM
        run: |
          find artifacts/rpm-opensuse -name "*.rpm" -exec gpg --batch --yes --detach-sign {} \;

      - name: Sign DEB
        run: |
          find artifacts/deb-ubuntu -name "*.deb" -exec gpg --batch --yes --detach-sign {} \;

      - name: Sign Arch package
        run: |
          find artifacts/pkg-arch -name "*.pkg.tar.zst" -exec gpg --batch --yes --detach-sign {} \;

      - name: Sign Ubuntu source package
        run: |
          cd artifacts/source-package
          debsign --re-sign -k ${{ steps.import-gpg.outputs.fingerprint }} *.changes

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-artifacts
          path: |
            artifacts/source-tarball/
            artifacts/rpm-fedora/
            artifacts/rpm-opensuse/
            artifacts/deb-ubuntu/
            artifacts/pkg-arch/
            artifacts/source-package/
          if-no-files-found: error

  create-tag:
    name: Create git tag
    needs: [prepare-release, sign-artifacts]
    if: needs.prepare-release.outputs.should_release == 'true' && needs.prepare-release.outputs.is_release_branch == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          TAG="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

  release:
    name: Create GitHub release
    needs: [prepare-release, sign-artifacts, create-tag]
    if: needs.prepare-release.outputs.should_release == 'true' && needs.prepare-release.outputs.is_release_branch == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download signed artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          name: signed-artifacts

      - name: List signed artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-release.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: |
            artifacts/source-tarball/*
            artifacts/rpm-fedora/*
            artifacts/rpm-opensuse/*
            artifacts/deb-ubuntu/*
            artifacts/pkg-arch/*
          generate_release_notes: true

  publish-ppa:
    name: Publish to PPA
    needs: [prepare-release, create-tag, release]
    if: needs.prepare-release.outputs.should_release == 'true' && needs.prepare-release.outputs.is_release_branch == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate PPA configuration
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true'
        env:
          PPA_USERNAME: ${{ secrets.PPA_LAUNCHPAD_USERNAME }}
          PPA_GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$PPA_USERNAME" ]; then
            echo "::error::PPA_LAUNCHPAD_USERNAME secret is not set."
            echo "Set it to: imz87 in GitHub repo Settings → Secrets."
            exit 1
          fi
          if [ -z "$PPA_GPG_KEY" ]; then
            echo "::error::GPG_PRIVATE_KEY secret is not set."
            echo "This key must be registered with Launchpad for the PPA owner."
            exit 1
          fi
          echo "PPA owner: ${PPA_USERNAME}"
          echo "PPA: ppa:${PPA_USERNAME}/paste-links"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare-release.outputs.version }}
          fetch-depth: 0

      - name: Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Install build and upload tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential devscripts debhelper fakeroot dput

      - name: Build source package
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          SERIES="${{ inputs.target_series || 'noble' }}"
          cp -r packaging/debian debian
          sed -i "1s/^paste-links (.*/paste-links (${VERSION}-1) ${SERIES}; urgency=low/" debian/changelog
          dpkg-buildpackage -us -uc -S

      - name: Sign source package
        run: |
          debsign --re-sign -k ${{ steps.import-gpg.outputs.fingerprint }} ../*.changes

      - name: Configure dput
        run: |
          cat > ~/.dput.cf << 'EOF'
          [ppa]
          login = anonymous
          method = ftp
          host = ppa.launchpad.net
          incoming = ~${{ secrets.PPA_LAUNCHPAD_USERNAME }}/ubuntu/paste-links
          EOF

      - name: Dry run (if enabled)
        if: inputs.dry_run == 'true'
        run: |
          echo "=== DRY RUN MODE ==="
          echo "Would publish to PPA: ppa:${{ secrets.PPA_LAUNCHPAD_USERNAME }}/paste-links"
          echo "Target series: ${{ inputs.target_series || 'noble' }}"
          echo "Files to upload:"
          ls -la ../*.changes ../*.dsc 2>/dev/null || echo "No source package files found"
          echo ""
          echo "To submit manually:"
          echo "  dput ppa ../*.changes"
          echo ""
          echo "=== DRY RUN COMPLETE ==="

      - name: Publish to PPA (if not dry run)
        if: inputs.dry_run != 'true'
        run: |
          echo "Publishing to PPA: ppa:${{ secrets.PPA_LAUNCHPAD_USERNAME }}/paste-links"
          dput ppa ../*.changes

      - name: Verify publication
        if: inputs.dry_run != 'true'
        run: |
          echo "=== Publication Status ==="
          echo "Package published to PPA: ppa:${{ secrets.PPA_LAUNCHPAD_USERNAME }}/paste-links"
          echo ""
          echo "Users can now install with:"
          echo "  sudo add-apt-repository ppa:${{ secrets.PPA_LAUNCHPAD_USERNAME }}/paste-links"
          echo "  sudo apt update"
          echo "  sudo apt install paste-links"

  publish-obs:
    name: Publish to OBS (openSUSE)
    needs: [prepare-release, create-tag, release]
    if: needs.prepare-release.outputs.should_release == 'true' && needs.prepare-release.outputs.is_release_branch == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate OBS configuration
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true'
        env:
          OBS_USERNAME: ${{ secrets.OPENSUSE_OBS_USERNAME }}
          OBS_PASSWORD: ${{ secrets.OPENSUSE_OBS_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$OBS_USERNAME" ]; then
            echo "::error::OPENSUSE_OBS_USERNAME secret is not set."
            exit 1
          fi
          if [ -z "$OBS_PASSWORD" ]; then
            echo "::error::OPENSUSE_OBS_PASSWORD secret is not set."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare-release.outputs.version }}
          fetch-depth: 0

      - name: Install osc
        run: |
          sudo apt-get update
          sudo apt-get install -y osc

      - name: Configure osc
        env:
          OBS_USERNAME: ${{ secrets.OPENSUSE_OBS_USERNAME }}
          OBS_PASSWORD: ${{ secrets.OPENSUSE_OBS_PASSWORD }}
        run: |
          OSC_CONFIG="${RUNNER_TEMP}/oscrc"
          printf '%s\n' \
            "[general]" \
            "apiurl = https://api.opensuse.org" \
            "" \
            "[https://api.opensuse.org]" \
            "user = ${OBS_USERNAME}" \
            "pass = ${OBS_PASSWORD}" \
            > "${OSC_CONFIG}"
          chmod 600 "${OSC_CONFIG}"
          echo "OSC_CONFIG=${OSC_CONFIG}" >> "${GITHUB_ENV}"
          echo "osc config written for user: ${OBS_USERNAME}"

      - name: Create source tarball
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          git archive --format=tar.gz --prefix="paste-links-${VERSION}/" \
              HEAD -o "paste-links-${VERSION}.tar.gz"

      - name: Test OBS connection
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true'
        run: |
          osc --version
          echo "HOME=${HOME}"
          ls -la "${OSC_CONFIG}"
          osc --config "${OSC_CONFIG}" -A https://api.opensuse.org ls home:imz87:paste-links || {
            echo "::error::OBS authentication failed."
            echo "Check that OPENSUSE_OBS_USERNAME and OPENSUSE_OBS_PASSWORD are correct."
            exit 1
          }
          echo "OBS authentication successful"

      - name: Submit to OBS
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true'
        env:
          OBS_PROJECT: home:imz87:paste-links
          OBS_PACKAGE: paste-links
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare-release.outputs.version }}"

          WORK_DIR="${HOME}/obs-work"
          mkdir -p "${WORK_DIR}"
          cd "${WORK_DIR}"

          osc --config "${OSC_CONFIG}" -A https://api.opensuse.org checkout "${OBS_PROJECT}" "${OBS_PACKAGE}"
          cd "${OBS_PROJECT}/${OBS_PACKAGE}"

          rm -f paste-links-*.tar.gz
          cp "${GITHUB_WORKSPACE}/paste-links-${VERSION}.tar.gz" .
          cp "${GITHUB_WORKSPACE}/packaging/opensuse/paste-links.spec" paste-links.spec
          sed -i "s/^Version:.*/Version:        ${VERSION}/" paste-links.spec

          osc --config "${OSC_CONFIG}" addremove
          osc --config "${OSC_CONFIG}" commit -m "Update to version ${VERSION}"

          echo "Submitted to OBS: ${OBS_PROJECT}/${OBS_PACKAGE}"
          echo "Monitor at: https://build.opensuse.org/package/show/${OBS_PROJECT}/${OBS_PACKAGE}"

      - name: Dry run summary
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        run: |
          echo "=== DRY RUN MODE ==="
          VERSION="${{ needs.prepare-release.outputs.version }}"
          echo "Source tarball: paste-links-${VERSION}.tar.gz"
          echo ""
          echo "To submit manually:"
          echo "  osc -A https://api.opensuse.org checkout home:imz87:paste-links paste-links"
          echo "  # copy files, then:"
          echo "  osc addremove && osc commit -m 'Update to ${VERSION}'"
          echo ""
          echo "Or re-run this workflow with dry_run=false"

  publish-aur:
    name: Publish to AUR (Arch)
    needs: [prepare-release, create-tag, release]
    if: needs.prepare-release.outputs.should_release == 'true' && needs.prepare-release.outputs.is_release_branch == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate AUR configuration
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true'
        env:
          AUR_SSH_KEY: ${{ secrets.ARCH_AUR_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$AUR_SSH_KEY" ]; then
            echo "::error::ARCH_AUR_SSH_KEY secret is not set."
            echo "Generate an SSH key and add it at: https://aur.archlinux.org/account/ssh-keys"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare-release.outputs.version }}
          fetch-depth: 0

      - name: Configure SSH
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true'
        env:
          AUR_SSH_KEY: ${{ secrets.ARCH_AUR_SSH_KEY }}
        run: |
          mkdir -p "${HOME}/.ssh"
          echo "${AUR_SSH_KEY}" > "${HOME}/.ssh/aur"
          chmod 600 "${HOME}/.ssh/aur"
          cat > "${HOME}/.ssh/config" << 'SSHEOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          SSHEOF
          ssh-keyscan aur.archlinux.org >> "${HOME}/.ssh/known_hosts" 2>/dev/null

      - name: Update AUR package
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true'
        env:
          AUR_PACKAGE: paste-links
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare-release.outputs.version }}"

          # Clone AUR repo
          AUR_DIR="${HOME}/aur-package"
          git clone "ssh://aur@aur.archlinux.org/${AUR_PACKAGE}.git" "${AUR_DIR}"
          cd "${AUR_DIR}"

          # Create source tarball URL
          SOURCE_URL="https://github.com/imz87/paste-links/archive/refs/tags/v${VERSION}.tar.gz"

          # Generate SHA256 checksum
          SHA256=$(curl -sL "${SOURCE_URL}" | sha256sum | cut -d' ' -f1)

          # Update PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s|source=.*|source=(\"${SOURCE_URL}\")|" PKGBUILD
          sed -i "s|sha256sums=.*|sha256sums=('${SHA256}')|" PKGBUILD

          # Update .SRCINFO
          docker run --rm \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "${AUR_DIR}:/build" \
            -w /build \
            archlinux:latest \
            bash -lc 'pacman -Sy --noconfirm base-devel && groupadd -g "${HOST_GID}" builder && useradd -m -u "${HOST_UID}" -g "${HOST_GID}" builder && chown -R builder:builder /build && su builder -c "cd /build && makepkg --printsrcinfo > .SRCINFO"'

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO

          if git diff --cached --quiet; then
            echo "AUR package is already up to date; nothing to commit."
          else
            git commit -m "Update to version ${VERSION}"
            git push origin master
          fi

          echo "Published to AUR: ${AUR_PACKAGE}"
          echo "Monitor at: https://aur.archlinux.org/${AUR_PACKAGE}"

      - name: Dry run summary
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        run: |
          echo "=== DRY RUN MODE ==="
          VERSION="${{ needs.prepare-release.outputs.version }}"
          echo "AUR package: paste-links"
          echo "Version: ${VERSION}"
          echo ""
          echo "To publish manually:"
          echo "  git clone ssh://aur@aur.archlinux.org/paste-links.git"
          echo "  # Update PKGBUILD with pkgver=${VERSION}"
          echo "  # makepkg --printsrcinfo > .SRCINFO"
          echo "  # git add PKGBUILD .SRCINFO && git commit -m 'Update to ${VERSION}' && git push"
          echo ""
          echo "Or re-run this workflow with dry_run=false"

  publish-copr:
    name: Publish to COPR
    needs: [prepare-release, create-tag, release]
    if: needs.prepare-release.outputs.should_release == 'true' && needs.prepare-release.outputs.is_release_branch == 'true'
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    permissions:
      contents: read
    steps:
      - name: Install packaging tools
        run: |
          dnf install -y rpm-build rpmdevtools copr-cli git

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare-release.outputs.version }}
          fetch-depth: 0

      - name: Mark workspace as safe for Git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up RPM build environment
        run: |
          rpmdev-setuptree

      - name: Create source tarball
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          git archive --format=tar.gz --prefix="paste-links-${VERSION}/" \
              HEAD -o "${HOME}/rpmbuild/SOURCES/paste-links-${VERSION}.tar.gz"

      - name: Update spec file version
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          sed -i "s/^Version:.*/Version:        ${VERSION}/" packaging/paste-links.spec
          cp packaging/paste-links.spec "${HOME}/rpmbuild/SPECS/"

      - name: Build source RPM
        run: |
          rpmbuild -bs "${HOME}/rpmbuild/SPECS/paste-links.spec"
          SRPM=$(find "${HOME}/rpmbuild/SRPMS" -name "*.src.rpm" | head -1)
          echo "SRPM=${SRPM}" >> "$GITHUB_ENV"
          echo "Built SRPM: ${SRPM}"

      - name: Configure COPR credentials
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true'
        env:
          COPR_CONFIG: ${{ secrets.COPR_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$COPR_CONFIG" ]; then
            echo "::error::COPR_API_TOKEN secret is empty."
            echo "Copy the full config block from: https://copr.fedorainfracloud.org/api/"
            exit 1
          fi
          if ! printf '%s' "$COPR_CONFIG" | grep -q '^\[copr-cli\]'; then
            echo "::error::COPR_API_TOKEN must contain the full COPR config block, starting with [copr-cli]."
            echo "Copy the full config block from: https://copr.fedorainfracloud.org/api/, not just the token value."
            exit 1
          fi
          mkdir -p "${HOME}/.config"
          printf '%s' "$COPR_CONFIG" > "${HOME}/.config/copr"
          chmod 600 "${HOME}/.config/copr"

      - name: Submit build to COPR
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true'
        env:
          COPR_OWNER: imz87
          COPR_PROJECT: paste-links
        run: |
          set -euo pipefail
          echo "Submitting to COPR: ${COPR_OWNER}/${COPR_PROJECT}"
          copr-cli build \
            --chroot fedora-42-x86_64 \
            --chroot fedora-rawhide-x86_64 \
            --chroot fedora-44-x86_64 \
            --chroot fedora-43-x86_64 \
            "${COPR_OWNER}/${COPR_PROJECT}" \
            "${SRPM}"
          echo "Build submitted successfully!"
          echo "Monitor at: https://copr.fedorainfracloud.org/coprs/${COPR_OWNER}/${COPR_PROJECT}/"

      - name: Dry run summary
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        run: |
          echo "=== DRY RUN MODE ==="
          echo "SRPM built: ${SRPM}"
          echo ""
          echo "To submit manually:"
          echo "  copr-cli build --chroot fedora-rawhide-x86_64 imz87/paste-links ${SRPM}"
          echo ""
          echo "Or re-run this workflow with dry_run=false"
