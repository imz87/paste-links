name: CI

on:
  push:
    branches: [main, master, fix/ci-auto-tag]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform dry run without publishing'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      target_series:
        description: 'Ubuntu series to publish to (e.g., noble, jammy)'
        required: false
        default: 'noble'
        type: string

jobs:
  test:
    name: ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: Fedora (latest)
            image: fedora:latest
          - distro: Ubuntu (latest LTS)
            image: ubuntu:24.04
          - distro: Debian (stable)
            image: debian:bookworm
          - distro: Arch Linux (latest)
            image: archlinux:latest
          - distro: openSUSE (Tumbleweed)
            image: opensuse/tumbleweed:latest

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packages (Fedora)
        if: startsWith(matrix.image, 'fedora')
        run: |
          dnf install -y \
            python3 python3-pip \
            python3-gobject gobject-introspection \
            gtk4 nautilus-python \
            pytest

      - name: Install packages (Ubuntu/Debian)
        if: startsWith(matrix.image, 'ubuntu') || startsWith(matrix.image, 'debian')
        run: |
          apt-get update
          apt-get install -y \
            python3 python3-pip \
            python3-gi gir1.2-gtk-4.0 \
            python3-nautilus gir1.2-nautilus-4.0 \
            python3-pytest

      - name: Install packages (Arch Linux)
        if: startsWith(matrix.image, 'archlinux')
        run: |
          pacman -Sy --noconfirm \
            python python-gobject gobject-introspection \
            gtk4 nautilus python-nautilus \
            python-pytest

      - name: Install packages (openSUSE)
        if: startsWith(matrix.image, 'opensuse')
        run: |
          zypper --non-interactive install \
            python313 python313-pip \
            python313-gobject gobject-introspection \
            gtk4 python313-nautilus \
            python313-pytest

      - name: Shell syntax check
        run: bash -n install.sh

      - name: Check Nautilus typelib availability
        id: typelib
        run: |
          if python3 -c "import gi; gi.require_version('Nautilus', '4.0')" 2>/dev/null; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Nautilus typelib not available in this container; skipping py_compile for nautilus_paste_shortcut.py"
          fi

      - name: Python syntax check (nautilus_paste_shortcut.py)
        if: steps.typelib.outputs.available == 'true'
        run: python3 -m py_compile src/nautilus_paste_shortcut.py

      - name: Run unit tests
        run: python3 -m pytest tests/ -v

  prepare-release:
    name: Prepare release
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.release.outputs.should_release }}
      is_release_branch: ${{ steps.release.outputs.is_release_branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read version file
        id: version
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION file: $VERSION"

      - name: Decide whether to build release artifacts
        id: release
        run: |
          SHOULD_RELEASE=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_RELEASE=true
          elif git diff --name-only HEAD~1 HEAD | grep -q '^VERSION$'; then
            SHOULD_RELEASE=true
          fi

          IS_RELEASE_BRANCH=false
          if [ "${GITHUB_REF}" = "refs/heads/main" ] || [ "${GITHUB_REF}" = "refs/heads/master" ] || [ "${GITHUB_REF}" = "refs/heads/fix/ci-auto-tag" ]; then
            IS_RELEASE_BRANCH=true
          fi

          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "is_release_branch=$IS_RELEASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE"
          echo "is_release_branch=$IS_RELEASE_BRANCH"

  source-tarball:
    name: Build source tarball
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source tarball
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          git archive --format=tar.gz --prefix="nautilus-paste-shortcut-${VERSION}/" \
              HEAD -o "nautilus-paste-shortcut-${VERSION}.tar.gz"

      - name: Upload source tarball
        uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: nautilus-paste-shortcut-*.tar.gz

  build-rpm-fedora:
    name: Build RPM (Fedora)
    needs: [prepare-release, source-tarball]
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y rpm-build rpmdevtools python3-devel

      - name: Set up RPM build tree
        run: rpmdev-setuptree

      - name: Download source tarball
        uses: actions/download-artifact@v4
        with:
          name: source-tarball
          path: ~/rpmbuild/SOURCES/

      - name: Build RPM
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          sed -i "s/^Version:.*/Version:        ${VERSION}/" packaging/nautilus-paste-shortcut.spec
          rpmbuild -ba packaging/nautilus-paste-shortcut.spec

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: rpm-fedora
          path: ~/rpmbuild/RPMS/noarch/nautilus-paste-shortcut-*.rpm

  build-source-package:
    name: Build source package (Ubuntu)
    needs: [prepare-release, source-tarball]
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y devscripts debhelper fakeroot

      - name: Build source package
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          cp -r packaging/debian debian
          sed -i "1s/(0.1.0-1)/(${VERSION}-1)/" debian/changelog
          dpkg-buildpackage -us -uc -S
          mv ../*.changes ../*.dsc ../*.debian.tar.* ../*.orig.tar.* ../*.buildinfo . 2>/dev/null || true

      - name: Upload source package
        uses: actions/upload-artifact@v4
        with:
          name: source-package
          path: |
            *.changes
            *.dsc
            *.debian.tar.*
            *.orig.tar.*
            *.buildinfo

  sign-artifacts:
    name: Sign release artifacts
    needs: [prepare-release, source-tarball, build-rpm-fedora, build-source-package]
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Install signing tools
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts

      - name: Sign source tarball
        run: |
          find artifacts/source-tarball -name "*.tar.gz" -exec gpg --batch --yes --detach-sign {} \;

      - name: Sign Fedora RPM
        run: |
          find artifacts/rpm-fedora -name "*.rpm" -exec gpg --batch --yes --detach-sign {} \;

      - name: Sign Ubuntu source package
        run: |
          cd artifacts/source-package
          debsign --re-sign -k ${{ steps.import-gpg.outputs.fingerprint }} *.changes

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-artifacts
          path: |
            artifacts/source-tarball/
            artifacts/rpm-fedora/
            artifacts/source-package/
          if-no-files-found: error

  create-tag:
    name: Create git tag
    needs: [prepare-release, sign-artifacts]
    if: needs.prepare-release.outputs.should_release == 'true' && needs.prepare-release.outputs.is_release_branch == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          TAG="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

  release:
    name: Create GitHub release
    needs: [prepare-release, sign-artifacts, create-tag]
    if: needs.prepare-release.outputs.should_release == 'true' && needs.prepare-release.outputs.is_release_branch == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download signed artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          name: signed-artifacts

      - name: List signed artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-release.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: |
            artifacts/source-tarball/*
            artifacts/rpm-fedora/*
          generate_release_notes: true

  publish-ppa:
    name: Publish to PPA
    needs: [prepare-release, sign-artifacts, build-source-package, create-tag]
    if: needs.prepare-release.outputs.should_release == 'true' && (needs.prepare-release.outputs.is_release_branch == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: ppa-publish
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download source package
        uses: actions/download-artifact@v4
        with:
          name: source-package

      - name: Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Install dput
        run: |
          sudo apt-get update
          sudo apt-get install -y dput

      - name: Configure dput
        run: |
          cat > ~/.dput.cf << 'EOF'
          [ppa]
          login = ${{ secrets.PPA_LAUNCHPAD_USERNAME }}
          method = ftp
          host = ppa.launchpad.net
          incoming = ~${{ secrets.PPA_LAUNCHPAD_USERNAME }}/ppa/ubuntu
          EOF

      - name: Dry run (if enabled)
        if: inputs.dry_run == 'true'
        run: |
          echo "=== DRY RUN MODE ==="
          echo "Would publish to PPA: ${{ secrets.PPA_LAUNCHPAD_USERNAME }}/ppa"
          echo "Target series: ${{ inputs.target_series || 'noble' }}"
          echo "Files to upload:"
          ls -la *.changes *.dsc 2>/dev/null || echo "No source package files found"
          echo ""
          echo "=== DRY RUN COMPLETE ==="

      - name: Publish to PPA (if not dry run)
        if: inputs.dry_run != 'true'
        run: |
          SERIES="${{ inputs.target_series || 'noble' }}"
          echo "Publishing to PPA for series: $SERIES"
          dput ppa nautilus-paste-shortcut_*.changes

      - name: Verify publication
        if: inputs.dry_run != 'true'
        run: |
          echo "=== Publication Status ==="
          echo "Package published to PPA: ${{ secrets.PPA_LAUNCHPAD_USERNAME }}/ppa"
          echo "Users can now install with:"
          echo "  sudo add-apt-repository ppa:${{ secrets.PPA_LAUNCHPAD_USERNAME }}/ppa"
          echo "  sudo apt update"
          echo "  sudo apt install nautilus-paste-shortcut"
