name: Publish to PPA

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform dry run without publishing'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      target_series:
        description: 'Ubuntu series to publish to (e.g., noble, jammy)'
        required: false
        default: 'noble'
        type: string

  push:
    tags:
      - 'v*'

jobs:
  validate:
    name: Validate version and signing
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version file
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION file: $VERSION"

      - name: Validate tag matches version (tag-triggered only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Git tag ($TAG) does not match VERSION file ($VERSION)"
            exit 1
          fi
          echo "Tag $TAG matches VERSION file"

  build-source-package:
    name: Build source package
    needs: validate
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y devscripts debhelper fakeroot

      - name: Build source package
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          cp -r packaging/debian debian
          sed -i "1s/(0.1.0-1)/(${VERSION}-1)/" debian/changelog
          dpkg-buildpackage -us -uc -S

      - name: Upload source package
        uses: actions/upload-artifact@v4
        with:
          name: source-package
          path: ../nautilus-paste-shortcut_*.changes

  publish-ppa:
    name: Publish to PPA
    needs: [validate, build-source-package]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    environment: ppa-publish
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download source package
        uses: actions/download-artifact@v4
        with:
          name: source-package

      - name: Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PPA_GPG_PASSPHRASE }}

      - name: Install dput
        run: |
          apt-get update
          apt-get install -y dput

      - name: Configure dput
        run: |
          cat > ~/.dput.cf << 'EOF'
          [ppa]
          login = ${{ secrets.PPA_LAUNCHPAD_USERNAME }}
          method = ftp
          host = ppa.launchpad.net
          incoming = ~${{ secrets.PPA_LAUNCHPAD_USERNAME }}/ppa/ubuntu
          EOF

      - name: Dry run (if enabled)
        if: inputs.dry_run == 'true'
        run: |
          echo "=== DRY RUN MODE ==="
          echo "Would publish to PPA: ${{ secrets.PPA_LAUNCHPAD_USERNAME }}/ppa"
          echo "Target series: ${{ inputs.target_series || 'noble' }}"
          echo "Files to upload:"
          ls -la *.changes *.dsc 2>/dev/null || echo "No source package files found"
          echo ""
          echo "=== DRY RUN COMPLETE ==="

      - name: Publish to PPA (if not dry run)
        if: inputs.dry_run != 'true'
        run: |
          SERIES="${{ inputs.target_series || 'noble' }}"
          echo "Publishing to PPA for series: $SERIES"
          dput ppa nautilus-paste-shortcut_*.changes

      - name: Verify publication
        if: inputs.dry_run != 'true'
        run: |
          echo "=== Publication Status ==="
          echo "Package published to PPA: ${{ secrets.PPA_LAUNCHPAD_USERNAME }}/ppa"
          echo "Users can now install with:"
          echo "  sudo add-apt-repository ppa:${{ secrets.PPA_LAUNCHPAD_USERNAME }}/ppa"
          echo "  sudo apt update"
          echo "  sudo apt install nautilus-paste-shortcut"
