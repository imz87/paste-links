name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform dry run without publishing'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      target_series:
        description: 'Ubuntu series to publish to (e.g., noble, jammy)'
        required: false
        default: 'noble'
        type: string
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  auto-tag:
    name: Auto-tag on VERSION change
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if VERSION changed
        id: version
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^VERSION$"; then
            VERSION=$(cat VERSION | tr -d '[:space:]')
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "VERSION changed to $VERSION"
          else
            echo "VERSION unchanged, skipping tag"
          fi

      - name: Create and push tag
        if: steps.version.outputs.version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Creating tag v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          echo "Tag v${VERSION} created — release workflow will run"

  validate:
    name: Validate version
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version file
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION file: $VERSION"

      - name: Validate tag matches version (tag-triggered only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Git tag ($TAG) does not match VERSION file ($VERSION)"
            exit 1
          fi
          echo "Tag $TAG matches VERSION file"

  source-tarball:
    name: Build source tarball
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source tarball
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          git archive --format=tar.gz --prefix="nautilus-paste-shortcut-${VERSION}/" \
              HEAD -o "nautilus-paste-shortcut-${VERSION}.tar.gz"

      - name: Upload source tarball
        uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: nautilus-paste-shortcut-*.tar.gz

  build-rpm-fedora:
    name: Build RPM (Fedora)
    needs: [validate, source-tarball]
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y rpm-build rpmdevtools python3-devel

      - name: Set up RPM build tree
        run: rpmdev-setuptree

      - name: Download source tarball
        uses: actions/download-artifact@v4
        with:
          name: source-tarball
          path: ~/rpmbuild/SOURCES/

      - name: Build RPM
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          sed -i "s/^Version:.*/Version:        ${VERSION}/" packaging/nautilus-paste-shortcut.spec
          rpmbuild -ba packaging/nautilus-paste-shortcut.spec

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: rpm-fedora
          path: ~/rpmbuild/RPMS/noarch/nautilus-paste-shortcut-*.rpm

  build-source-package:
    name: Build source package (Ubuntu)
    needs: [validate, source-tarball]
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y devscripts debhelper fakeroot

      - name: Build source package
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          cp -r packaging/debian debian
          sed -i "1s/(0.1.0-1)/(${VERSION}-1)/" debian/changelog
          dpkg-buildpackage -us -uc -S
          # Move build artifacts to workspace root for upload
          mv ../*.changes ../*.dsc ../*.debian.tar.* ../*.orig.tar.* ../*.buildinfo . 2>/dev/null || true

      - name: Upload source package
        uses: actions/upload-artifact@v4
        with:
          name: source-package
          path: |
            *.changes
            *.dsc
            *.debian.tar.*
            *.orig.tar.*
            *.buildinfo

  sign-artifacts:
    name: Sign release artifacts
    needs: [validate, source-tarball, build-rpm-fedora, build-source-package]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Install signing tools
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts

      - name: Sign source tarball
        run: |
          find artifacts/source-tarball -name "*.tar.gz" -exec gpg --batch --yes --detach-sign {} \;

      - name: Sign Fedora RPM
        run: |
          find artifacts/rpm-fedora -name "*.rpm" -exec gpg --batch --yes --detach-sign {} \;

      - name: Sign Ubuntu source package
        run: |
          cd artifacts/source-package
          debsign --re-sign -k ${{ steps.import-gpg.outputs.keyid }} *.changes

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-artifacts
          path: |
            artifacts/source-tarball/
            artifacts/rpm-fedora/
            artifacts/source-package/
          if-no-files-found: error

  release:
    name: Create release
    needs: [validate, sign-artifacts]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download signed artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          name: signed-artifacts

      - name: List signed artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/source-tarball/*
            artifacts/rpm-fedora/*
          generate_release_notes: true

  publish-ppa:
    name: Publish to PPA
    needs: [validate, sign-artifacts, build-source-package]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    environment: ppa-publish
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download source package
        uses: actions/download-artifact@v4
        with:
          name: source-package

      - name: Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Install dput
        run: |
          sudo apt-get update
          sudo apt-get install -y dput

      - name: Configure dput
        run: |
          cat > ~/.dput.cf << 'EOF'
          [ppa]
          login = ${{ secrets.PPA_LAUNCHPAD_USERNAME }}
          method = ftp
          host = ppa.launchpad.net
          incoming = ~${{ secrets.PPA_LAUNCHPAD_USERNAME }}/ppa/ubuntu
          EOF

      - name: Dry run (if enabled)
        if: inputs.dry_run == 'true'
        run: |
          echo "=== DRY RUN MODE ==="
          echo "Would publish to PPA: ${{ secrets.PPA_LAUNCHPAD_USERNAME }}/ppa"
          echo "Target series: ${{ inputs.target_series || 'noble' }}"
          echo "Files to upload:"
          ls -la *.changes *.dsc 2>/dev/null || echo "No source package files found"
          echo ""
          echo "=== DRY RUN COMPLETE ==="

      - name: Publish to PPA (if not dry run)
        if: inputs.dry_run != 'true'
        run: |
          SERIES="${{ inputs.target_series || 'noble' }}"
          echo "Publishing to PPA for series: $SERIES"
          dput ppa nautilus-paste-shortcut_*.changes

      - name: Verify publication
        if: inputs.dry_run != 'true'
        run: |
          echo "=== Publication Status ==="
          echo "Package published to PPA: ${{ secrets.PPA_LAUNCHPAD_USERNAME }}/ppa"
          echo "Users can now install with:"
          echo "  sudo add-apt-repository ppa:${{ secrets.PPA_LAUNCHPAD_USERNAME }}/ppa"
          echo "  sudo apt update"
          echo "  sudo apt install nautilus-paste-shortcut"
